<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoリスト</title>
    <script type="module" src="./todo.ts" defer></script>
    <link rel="stylesheet" href="../../../src/style.css">
</head>

<body>
    <h1>Todoリスト</h1>

    <form id="todoForm">
        <div>
            <label for="title">タイトル</label>
            <input id="title" type="text" placeholder="新しいTodoのタイトル" required>
        </div>
        <div>
            <label for="description">詳細</label>
            <input id="description" type="text" placeholder="新しいTodoの詳細">
        </div>
        <button type="submit">追加</button>
    </form>

    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
        <div class="bg-white shadow-lg w-96 p-6">
            <h2 class="text-xl font-bold mb-4">Todo詳細</h2>
            <div class="space-y-2 mb-4">
                <p><span class="font-semibold">タイトル:</span> <span id="modalTitle"></span></p>
                <p><span class="font-semibold">詳細:</span> <span id="modalDescription"></span></p>
                <p><span class="font-semibold">作成日:</span> <span id="modalCreatedAt"></span></p>
                <p><span class="font-semibold">更新日:</span> <span id="modalUpdatedAt"></span></p>
            </div>

            <form id="modalUpdateForm" class="space-y-4">
                <input type="hidden" id="modalUpdateId">
                <div>
                    <label for="modalUpdateTitle">タイトル</label>
                    <input type="text" id="modalUpdateTitle" placeholder="Todoのタイトル" required>
                </div>
                <div>
                    <label for="modalUpdateDescription">詳細</label>
                    <input type="text" id="modalUpdateDescription" placeholder="Todoの詳細">
                </div>
                <div>
                    <label for="modalUpdateIsCompleted">完了済み</label>
                    <input type="checkbox" id="modalUpdateIsCompleted">
                </div>
                <button type="submit">更新</button>
            </form>
            <button id="modalDeleteButton">
                削除
            </button>
            <button id="modalCloseButton">
                閉じる
            </button>
        </div>
    </div>

    <table id="todoTable">
        <thead>
            <tr>
                <th>タイトル</th>
                <th>完了済み</th>
                <th>作成日</th>
                <th>詳細</th>
            </tr>
        </thead>
        <tbody id="todoTableBody">
        </tbody>
    </table>

    <button id="logoutButton">ログアウト</button>
</body>

</html>
