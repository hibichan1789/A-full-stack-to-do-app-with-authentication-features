<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント登録</title>
    <script type="module" src="./register.ts" defer></script>
    <link rel="stylesheet" href="../../style.css">
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="w-full max-w-md bg-white shadow-md rounded-lg p-6">
        <h1 class="text-2xl font-bold mb-6 text-center">アカウント登録</h1>
        <form id="registerForm" class="space-y-4">
            <div>
                <label for="userName" class="block mb-1 font-medium">ユーザー名</label>
                <input id="userName" type="text" required
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label for="email" class="block mb-1 font-medium">メールアドレス</label>
                <input id="email" type="email" required
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label for="password" class="block mb-1 font-medium">パスワード</label>
                <input id="password" type="password" required
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <button type="submit"
                class="w-full bg-green-600 text-white font-semibold rounded py-2 hover:bg-green-700 transition-colors cursor-pointer">
                登録
            </button>
        </form>
        <p class="mt-4 text-center text-sm">
            <a href="/src/pages/login/login.html"
                class="text-blue-600 hover:underline"
            >
                すでにアカウントをお持ちの方はこちら
            </a>
        </p>
    </div>
</body>

</html>
