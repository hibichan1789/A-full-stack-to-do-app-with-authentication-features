services:
  db:
    image: postgres:16
    container_name: todo-auth-postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      #POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${PORT}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      #- ./sql_files:/tmp/postgres
    env_file:
      - .env
    restart: always
    networks:
      - todo-auth-network
networks:
  todo-auth-network:
volumes:
  pgdata: